<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-700">

    <div class="bg-white border-b px-4 py-2 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="create.html" class="bg-purple-800 text-white px-3 py-1 rounded text-sm font-medium hover:bg-purple-900">New</a>
            <h1 class="text-lg font-semibold text-gray-600">Division</h1>
            <i class="fas fa-cog text-gray-400 cursor-pointer"></i>
        </div>
        
        <div class="flex-1 max-w-xl mx-8">
            <div class="relative flex items-center border rounded shadow-sm px-2 py-1 bg-white">
                <i class="fas fa-search text-gray-400 mr-2"></i>
                <span class="bg-purple-100 text-purple-800 text-xs px-2 py-0.5 rounded flex items-center gap-1">
                    Active <i class="fas fa-times cursor-pointer"></i>
                </span>
                <input type="text" placeholder="Search..." class="ml-2 outline-none w-full text-sm">
                <i class="fas fa-caret-down text-gray-400 ml-2"></i>
            </div>
        </div>

        <div class="flex items-center gap-4 text-sm text-gray-500">
            <span>1-2 / 2</span>
            <div class="flex gap-2">
                <i class="fas fa-chevron-left cursor-pointer"></i>
                <i class="fas fa-chevron-right cursor-pointer"></i>
            </div>
        </div>
    </div>

    <div class="p-0">
        <table class="w-full text-left border-collapse bg-white">
            <thead>
                <tr class="border-b text-sm font-bold text-gray-700 bg-gray-50">
                    <th class="p-3 w-10"><input type="checkbox"></th>
                    <th class="p-3 border-r">Division Code</th>
                    <th class="p-3">Division Name</th>
                    <th class="p-3 text-right"><i class="fas fa-columns text-gray-400"></i></th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <tr class="border-b hover:bg-gray-50 cursor-pointer">
                    <td class="p-3 text-center"><input type="checkbox"></td>
                    <td class="p-3">20</td>
                    <td class="p-3">Default Division</td>
                    <td></td>
                </tr>
                <tr class="border-b hover:bg-gray-50 cursor-pointer">
                    <td class="p-3 text-center"><input type="checkbox"></td>
                    <td class="p-3">10</td>
                    <td class="p-3">Domestik</td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
