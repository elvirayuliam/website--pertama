<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Division - Odoo Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .toggle-checkbox:checked { right: 0; border-color: #68D391; }
        .toggle-checkbox:checked + .toggle-label { background-color: #48bb78; }
        input:focus { border-bottom: 2px solid #00a09d; outline: none; }
    </style>
</head>
<body class="bg-[#f0f0f0] text-gray-700 font-sans">

    <div class="bg-white border-b px-4 py-2 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <button onclick="window.location.reload()" class="bg-white border border-gray-300 px-4 py-1 rounded text-sm font-medium hover:bg-gray-100 shadow-sm">New</button>
            
            <div class="flex items-center text-sm">
                <a href="index.html" class="text-[#00a09d] font-semibold hover:underline">Division</a>
                <span class="text-gray-400 mx-1">/</span>
                <span class="text-gray-500">New</span>
            </div>

            <div class="flex gap-3 text-gray-400 ml-4 text-xs">
                <i class="fas fa-cog cursor-pointer hover:text-gray-600"></i>
                <i class="fas fa-cloud-upload-alt cursor-pointer hover:text-gray-600" title="Save"></i>
                <a href="index.html"><i class="fas fa-times cursor-pointer hover:text-red-500"></i></a>
            </div>
        </div>
        <i class="far fa-bookmark text-gray-400 cursor-pointer"></i>
    </div>

    <div class="max-w-7xl mx-auto mt-4 mb-10 bg-white border rounded-sm shadow-md">
        
        <div class="p-10 grid grid-cols-1 md:grid-cols-2 gap-x-20 gap-y-6">
            
            <div class="space-y-6">
                <div class="flex flex-col border-b border-gray-200 focus-within:border-[#00a09d] transition-colors">
                    <label class="text-xs font-bold text-gray-600 flex items-center gap-1">
                        Division Code <span class="text-[#00a09d]" title="Kode unik divisi">?</span>
                    </label>
                    <input type="text" id="div_code" placeholder="e.g. 30" class="py-1 text-sm bg-transparent">
                </div>

                <div class="flex flex-col border-b border-gray-200 focus-within:border-[#00a09d] transition-colors">
                    <label class="text-xs font-bold text-gray-600 flex items-center gap-1">
                        Division Name <span class="text-[#00a09d]" title="Nama divisi">?</span>
                    </label>
                    <input type="text" id="div_name" placeholder="e.g. Export" class="py-1 text-sm bg-transparent">
                </div>
            </div>

            <div class="space-y-4 text-sm">
                <div class="flex items-start">
                    <span class="w-40 font-bold text-gray-600 flex items-center gap-1">Company <span class="text-[#00a09d]">?</span></span>
                    <span class="text-[#00a09d] font-medium cursor-pointer hover:underline">PT Quadra Dinamika Internasional</span>
                </div>

                <div class="flex items-center">
                    <span class="w-40 font-bold text-gray-600 flex items-center gap-1">Active <span class="text-[#00a09d]">?</span></span>

                        <label for="toggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-green-500 cursor-pointer"></label>
                    </div>
