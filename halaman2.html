<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Division</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .toggle-checkbox:checked { right: 0; border-color: #68D391; }
        .toggle-checkbox:checked + .toggle-label { background-color: #48bb78; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="bg-white border-b px-4 py-2 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3">
            <button class="bg-white border border-gray-300 px-4 py-1 rounded text-sm font-medium text-gray-700 hover:bg-gray-100">New</button>
            <div class="text-sm">
                <span class="text-teal-600 font-semibold cursor-pointer">Division</span>
                <span class="text-gray-400 mx-1">/</span>
                <span class="text-gray-500">New</span>
            </div>
            <div class="flex gap-2 text-gray-400 ml-2 text-xs">
                <i class="fas fa-cog cursor-pointer"></i>
                <i class="fas fa-cloud-upload-alt cursor-pointer"></i>
                <i class="fas fa-times cursor-pointer"></i>
            </div>
        </div>
        <i class="far fa-bookmark text-gray-400"></i>
    </div>

    <div class="max-w-7xl mx-auto mt-4 bg-white border rounded shadow-sm overflow-hidden">
        <div class="p-8 grid grid-cols-2 gap-x-16 gap-y-4">
            
            <div class="space-y-4">
                <div class="flex items-center border-b border-teal-500 pb-1">
                    <label class="w-32 text-sm font-bold text-gray-700">Division Code <span class="text-teal-500">?</span></label>
                    <input type="text" class="flex-1 outline-none text-sm bg-transparent">
                </div>
                <div class="flex items-center border-b border-teal-500 pb-1">
                    <label class="w-32 text-sm font-bold text-gray-700">Division Name <span class="text-teal-500">?</span></label>
                    <input type="text" class="flex-1 outline-none text-sm bg-transparent">
                </div>
            </div>

            <div class="space-y-4 text-sm">
                <div class="flex">
                    <span class="w-32 font-bold text-gray-700">Company <span class="text-teal-500">?</span></span>
                    <span class="text-teal-600 cursor-pointer">PT Quadra Dinamika Internasional</span>
                </div>
                <div class="flex items-center">
                    <span class="w-32 font-bold text-gray-700">Active <span class="text-teal-500">?</span></span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="toggle" checked class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer right-0 border-green-500"/>
                        <label for="toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-green-500 cursor-pointer"></label>
                    </div>
                </div>
                <div class="flex"><span class="w-32 font-bold text-gray-700">Created by <span class="text-teal-500">?</span></span></div>
                <div class="flex"><span class="w-32 font-bold text-gray-700">Created on <span class="text-teal-500">?</span></span></div>
                <div class="flex"><span class="w-32 font-bold text-gray-700">Last Updated on <span class="text-teal-500">?</span></span></div>
            </div>
        </div>

        <div class="bg-gray-50 border-t p-4 flex gap-2 border-b">
            <button class="bg-purple-900 text-white px-4 py-1.5 rounded text-sm font-medium">Send message</button>
            <button class="bg-white border px-4 py-1.5 rounded text-sm font-medium text-gray-600">Log note</button>
            <button class="bg-white border px-4 py-1.5 rounded text-sm font-medium text-gray-600">Activities</button>
            
            <div class="ml-auto flex gap-4 text-gray-400 items-center">
                <i class="fas fa-search cursor-pointer"></i>
                <i class="fas fa-paperclip cursor-pointer"></i>
                <i class="fas fa-user-friends cursor-pointer"></i> <span class="text-xs -ml-3">0</span>
                <span class="text-sm text-gray-500 cursor-pointer ml-2">Follow</span>
            </div>
        </div>
        
        <div class="p-4 flex gap-4 items-start">
            <div class="w-10 h-10 bg-red-500 rounded flex items-center justify-center text-white font-bold">Q</div>
            <div>
                <div class="text-sm">
                    <span class="font-bold">ADMINISTRATOR</span> 
                    <span class="text-gray-400 text-xs ml-2">Today at 14:09</span>
                </div>
                <p class="text-sm text-gray-600 italic">Creating a new record...</p>
            </div>
        </div>
    </div>

</body>
</html>
